baseURL: "https://blog.victorcardoso.dev/"
languageCode: "en-us"
title: "CATs, Cables & Containers"
theme: ["PaperMod"]

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true

minify:
  disableXML: false

pagination:
  disableAliases: false
  pagerSize: 5

outputFormats:
  llms:
    mediaType: "text/plain"
    baseName: "llms"
    isPlainText: true
    notAlternative: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
    - llms

permalinks:
  blog: "/blog/:year/:month/:slug/"

mainsections: ["blog"]

menu:
  main:
    - identifier: Posts
      name: Posts
      url: /archives
      weight: 10
    - identifier: search
      name: Search
      url: /search/
      weight: 15
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: links
      name: Links
      url: "https://links.victorcardoso.dev/"
      weight: 30
    - identifier: about
      name: About
      url: /about/
      weight: 40

params:
  env: production
  description: "A technical blog about Linux, networking, containers, homelab, and software."
  author: "shoganaich"
  keywords: [Blog, Technical, Linux, Docker]
  # author: ["Me", "You"] # multiple authors
  images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"

  ShowReadingTime: false
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  customHeadHTML: <script defer src="https://analytics.victorcardoso.dev/script.js" data-website-id="1bb79c6f-8eec-49b4-aad7-6299ffd693cb"></script>
            
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    threshold: 0.4
    distance: 1000
    minMatchCharLength: 2
    keys: ["title", "permalink", "summary", "content"]

  homeInfoParams:
    Title: "Cats, Cables & Containers"
    Content: >
        - A public notebook on security, infrastructure, and homelab tinkering. I write about Linux, self-hosting, Docker and Compose projects, networking labs, and security tools, along with SDR, HackRF, Flipper Zero, and NFC/RFID experiments. I also share what I’m learning through small programming projects and scripts.

  socialIcons:
    - name: github
      title: View my Github
      url: "https://github.com/shoganaich"
    - name: link
      title: More Links
      url: "https://links.victorcardoso.dev/"
    - name: rss
      title: RSS
      url: /blog/index.xml

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false