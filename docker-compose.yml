services:
  nginx:
    image: nginx:1.27-alpine
    container_name: cats-cables-containers-nginx
    restart: unless-stopped

    ports:
      - "8080:80"   # change to "80:80" if you want it directly on port 80

    volumes:
      # Hugo output
      - ./public:/usr/share/nginx/html:ro

      # Your nginx vhost config in the repo
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    # Optional healthcheck
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3